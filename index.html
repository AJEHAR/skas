  <style>

    .cscroll::-webkit-scrollbar { width:4px; height:4px; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
    .fade-up { animation: fadeUp 0.3s ease both; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .fade-in { animation: fadeIn 0.25s ease both; }
    @keyframes scaleIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
    .scale-in { animation: scaleIn 0.25s ease both; }
    @keyframes slideInRight { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }

    @keyframes slideOutRight { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(24px)} }
    .badge-cemerlang{background:#dcfce7;color:#166534;}
    .badge-baik{background:#dbeafe;color:#1e40af;}
    .badge-sederhana{background:#fef9c3;color:#854d0e;}
    .badge-perlu{background:#fee2e2;color:#991b1b;}

    @media(hover:hover){

    .input-error { border-color:#ef4444 !important; background:#fff5f5; }
    .sesi-btn { transition:all 0.15s; }
    @media(hover:hover){ .trow:hover{background:#f8faff;} }
    .modal-bg { backdrop-filter:blur(3px); }
    .tap-target { min-height:44px; min-width:44px; }
    .pin-dot { transition: all 0.2s; }
    .pin-dot.filled { background:#1e40af; transform:scale(1.1); }
    .pin-btn { transition:all 0.15s; user-select:none; }
    .pin-btn:active { transform:scale(0.92); background:#e0e7ff; }
    .pw-input-wrap { position:relative; }
    .pw-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#94a3b8; }

    const ADMIN_PASSWORD = "skpkcba4082";

    const tarafInfo = s => {

    // ===================== TOAST SYSTEM =====================
    function useToast() {
      const [toasts, setToasts] = useState([]);
      const showToast = (msg, type='success') => {
        const id = Date.now() + Math.random();
        setToasts(prev => [...prev, {id, msg, type}]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
      };
      return {toasts, showToast};
    }

    function ToastContainer({toasts}) {
      const icons = {success:'fa-check-circle',error:'fa-times-circle',warning:'fa-exclamation-triangle',info:'fa-info-circle'};
      const colors = {
        success:'bg-green-600',error:'bg-red-600',
        warning:'bg-amber-500',info:'bg-blue-600'
      };
      return (
        <div className="fixed top-4 right-4 z-[200] space-y-2 pointer-events-none" style={{maxWidth:'320px'}}>
          {toasts.map(t => (
            <div key={t.id} className={`slide-in-right flex items-start gap-3 px-4 py-3 rounded-2xl text-white shadow-xl text-sm font-semibold ${colors[t.type]||colors.info}`}>
              <i className={`fas ${icons[t.type]||icons.info} mt-0.5 shrink-0`}></i>
              <span className="leading-snug">{t.msg}</span>
            </div>
          ))}
        </div>
      );
    }

    // ===================== CONFIRM MODAL =====================
    function ConfirmModal({message, subMessage, confirmLabel='Sahkan', danger=false, onConfirm, onCancel}) {

    // ===================== ADMIN AUTH MODAL =====================
    function AdminAuthModal({onSuccess, onCancel}) {
      const [tab, setTab] = useState('password');
      const [pwVal, setPwVal] = useState('');
      const [showPw, setShowPw] = useState(false);
      const [pinVal, setPinVal] = useState('');
      const [error, setError] = useState('');
      const [shakeKey, setShakeKey] = useState(0);
      const pwRef = useRef(null);

      useEffect(() => {
        if(tab==='password' && pwRef.current) pwRef.current.focus();
        setError(''); setPwVal(''); setPinVal('');
      }, [tab]);

      const triggerShake = () => {
        setShakeKey(k=>k+1);
        setError(tab==='password'?'Kata laluan tidak sah.':'PIN tidak sah.');
        if(tab==='pin') setPinVal('');
      };

      const checkPassword = () => { if(pwVal===ADMIN_PASSWORD) onSuccess(); else triggerShake(); };

      const handlePinDigit = (d) => {
        if(pinVal.length>=4) return;
        const next = pinVal+d;
        setPinVal(next);
        if(next.length===4) setTimeout(() => { if(next===ADMIN_PIN) onSuccess(); else triggerShake(); }, 150);
      };

      return (
        <div className="fixed inset-0 bg-black/60 modal-bg z-50 flex items-center justify-center p-4 fade-in">

              </button>
              <button onClick={()=>setTab('pin')} className={`flex-1 pb-3 text-sm font-bold flex items-center justify-center gap-2 auth-tab ${tab==='pin'?'active text-[#1e40af]':'text-gray-400'}`}>

              </button>
            </div>
            <div className="p-5" key={shakeKey}>
              {tab==='password' && (
                <div className={`fade-in ${error?'shake':''}`}>
                  <p className="text-xs text-gray-500 mb-3 font-semibold">Masukkan kata laluan pentadbir:</p>
                  <div className="pw-input-wrap mb-3">
                    <input ref={pwRef} type={showPw?'text':'password'} value={pwVal}
                      onChange={e=>{setPwVal(e.target.value);setError('');}}
                      onKeyDown={e=>{if(e.key==='Enter') checkPassword();}}
                      placeholder="Kata laluan"
                      className={`w-full border-2 rounded-xl px-4 py-3 text-sm font-bold pr-12 transition-all ${error?'border-red-300 bg-red-50':'border-gray-200'}`}/>
                    <span className="pw-toggle" onClick={()=>setShowPw(s=>!s)}>
                      <i className={`fas ${showPw?'fa-eye-slash':'fa-eye'} text-sm`}></i>
                    </span>
                  </div>
                  {error && <p className="text-xs text-red-500 font-bold mb-3 flex items-center gap-1"><i className="fas fa-exclamation-circle"></i> {error}</p>}
                  <div className="flex gap-2">
                    <button onClick={onCancel} className="flex-1 py-3 border-2 border-gray-200 text-gray-500 text-sm font-bold rounded-xl">Batal</button>
                    <button onClick={checkPassword} className="flex-1 py-3 bg-[#1e40af] hover:bg-[#1e3a8a] text-white text-sm font-extrabold rounded-xl transition-colors">Masuk</button>
                  </div>
                </div>
              )}
              {tab==='pin' && (
                <div className={`fade-in ${error?'shake':''}`}>

                  <div className="flex justify-center gap-4 mb-2">
                    {[0,1,2,3].map(i=>(
                      <div key={i} className={`pin-dot w-4 h-4 rounded-full border-2 ${pinVal.length>i?'border-[#1e40af] filled':'border-gray-300 bg-gray-100'}`}></div>
